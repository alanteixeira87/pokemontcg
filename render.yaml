services:
  - type: web
    name: pokemon-tcg-local-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon-tcg-postgres
          property: connectionString
      - key: POKEMON_TCG_API_URL
        value: https://api.pokemontcg.io/v2
      - key: POKEMON_TCG_API_KEY
        sync: false
      - key: POKEWALLET_API_URL
        value: https://api.pokewallet.io
      - key: POKEWALLET_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
databases:
  - name: pokemon-tcg-postgres
    databaseName: pokemontcg
    user: pokemontcg
